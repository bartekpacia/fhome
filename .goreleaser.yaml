version: 2

builds:
  - id: fhome
    binary: fhome
    main: ./cmd/fhome
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

  - id: fhome-homekit
    binary: fhome-homekit
    main: ./cmd/fhome-homekit
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

  - id: fhome-exporter
    binary: fhome-exporter
    main: ./cmd/fhome-exporter
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - id: fhome
    name_template: "fhome_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - fhome
    files:
      - LICENSE
      - README.md
    wrap_in_directory: true
    format_overrides:
      - goos: windows
        formats: zip

  - id: fhome-homekit
    name_template: "fhome-homekit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - fhome-homekit
    files:
      - LICENSE
      - README.md
    wrap_in_directory: true
    format_overrides:
      - goos: windows
        formats: zip

  - id: fhome-exporter
    name_template: "fhome-exporter_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - fhome-exporter
    files:
      - LICENSE
      - README.md
    wrap_in_directory: true
    format_overrides:
      - goos: windows
        formats: zip

# Required for AUR sources
source:
  enabled: true

changelog:
  disable: true

brews:
  - name: fhome
    ids:
      - fhome
    repository:
      owner: bartekpacia
      name: homebrew-tools
    directory: Formula
    homepage: https://github.com/bartekpacia/fhome
    description: Interact with smart home devices connected to F&Home
    license: MIT
    install: |
      bin.install "fhome"
      generate_completions_from_executable(bin/"fhome", "completion")

  - name: fhome-homekit
    ids:
      - fhome-homekit
    repository:
      owner: bartekpacia
      name: homebrew-tools
    directory: Formula
    homepage: https://github.com/bartekpacia/fhome
    description: HomeKit bridge for F&Home
    license: MIT
    install: |
      bin.install "fhome-homekit"

  - name: fhome-exporter
    ids:
      - fhome-exporter
    repository:
      owner: bartekpacia
      name: homebrew-tools
    directory: Formula
    homepage: https://github.com/bartekpacia/fhome
    description: Prometheus exporter for F&Home
    license: MIT
    install: |
      bin.install "fhome-exporter"

aur_sources:
  - name: fhome
    homepage: https://github.com/bartekpacia/fhome
    description: Interact with smart home devices connected to F&Home
    maintainers:
      - Bartek Pacia <barpac02@gmail.com>
    license: MIT
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: git@github.com:bartekpacia/aur.git
    makedepends:
      - go
    directory: fhome
    commit_msg_template: update fhome to {{ .Tag }}
    prepare: |
      go mod download -modcacherw
    build: |
      CGO_ENABLED=0 go build \
        -trimpath \
        -mod=readonly \
        -modcacherw \
        -ldflags "-X main.version=$pkgver" \
        ./cmd/fhome
    package: |
      # bin
      install -Dm755 fhome "${pkgdir}/usr/bin/fhome"

      # license
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/fhome/LICENSE"

      # completions
      ./fhome completion bash > completion_bash
      ./fhome completion zsh > completion_zsh
      install -Dm755 completion_bash "${pkgdir}/usr/share/bash-completion/completions/fhome"
      install -Dm755 completion_zsh "${pkgdir}/usr/share/zsh/site-functions/_fhome"

aurs:
  - name: fhome-bin
    ids:
      - fhome
    homepage: https://github.com/bartekpacia/fhome
    description: Interact with smart home devices connected to F&Home
    maintainers:
      - Bartek Pacia <barpac02@gmail.com>
    license: MIT
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: git@github.com:bartekpacia/aur.git
    directory: fhome-bin
    commit_msg_template: update fhome to {{ .Tag }}
    package: |
      cd "$pkgname-$pkgver"
      # bin
      install -Dm755 fhome "${pkgdir}/usr/bin/fhome"

      # license
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/fhome/LICENSE"

      # completions
      ./fhome completion bash > completion_bash
      ./fhome completion zsh > completion_zsh
      install -Dm755 completion_bash "${pkgdir}/usr/share/bash-completion/completions/fhome"
      install -Dm755 completion_zsh "${pkgdir}/usr/share/zsh/site-functions/_fhome"

  - name: fhome-homekit-bin
    ids:
      - fhome-homekit
    homepage: https://github.com/bartekpacia/fhome
    description: HomeKit bridge for F&Home
    maintainers:
      - Bartek Pacia <barpac02@gmail.com>
    license: MIT
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: git@github.com:bartekpacia/aur.git
    directory: fhome-homekit-bin
    commit_msg_template: update fhome-homekit to {{ .Tag }}
    package: |
      cd "$pkgname-$pkgver"
      # bin
      install -Dm755 fhome-homekit "${pkgdir}/usr/bin/fhome-homekit"

      # license
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/fhome-homekit/LICENSE"

  - name: fhome-exporter-bin
    ids:
      - fhome-exporter
    homepage: https://github.com/bartekpacia/fhome
    description: Prometheus exporter for F&Home
    maintainers:
      - Bartek Pacia <barpac02@gmail.com>
    license: MIT
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: git@github.com:bartekpacia/aur.git
    directory: fhome-exporter-bin
    commit_msg_template: update fhome-exporter to {{ .Tag }}
    package: |
      cd "$pkgname-$pkgver"
      # bin
      install -Dm755 fhome-exporter "${pkgdir}/usr/bin/fhome-exporter"

      # license
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/fhome-exporter/LICENSE"
